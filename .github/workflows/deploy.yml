name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  APP_SERVICE_NAME: probably-app
  WORKER_SERVICE_NAME: probably-worker
  REGION: us-west1
  ARTIFACT_REGISTRY_REPO: probably
  IMAGE_NAME: probably-server

jobs:
  build:
    name: Build Server Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - run: go mod download

      - name: Calculate semantic version
        id: semver
        uses: ./.github/actions/semver
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}

      - name: Build CSS
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          ./tailwindcss-linux-x64 -i ./static/input.css -o ./static/output.css --minify

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o server ./cmd/server

      - uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: server
          retention-days: 30

      - uses: actions/upload-artifact@v4
        with:
          name: static-files
          path: static/
          retention-days: 30

      - name: Generate release notes
        uses: ./.github/actions/release-notes
        with:
          version: ${{ steps.semver.outputs.version }}
          cursor_api_key: ${{ secrets.CURSOR_API_KEY }}

      - uses: softprops/action-gh-release@v1
        with:
          files: server
          tag_name: ${{ steps.semver.outputs.version }}
          name: Release ${{ steps.semver.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ steps.semver.outputs.is_release != 'true' }}
          make_latest: ${{ steps.semver.outputs.is_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: server-binary
          path: .

      - uses: actions/download-artifact@v4
        with:
          name: static-files
          path: .
          merge-multiple: false

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          cat > Dockerfile.deploy << 'EOF'
          FROM gcr.io/distroless/static-debian12:nonroot
          COPY server /server
          COPY static /static
          COPY install.sh /install.sh
          EXPOSE 8080 8081
          ENTRYPOINT ["/server"]
          EOF
          chmod +x server
          docker build -f Dockerfile.deploy \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy App to Cloud Run
        run: |
          # Get the default Compute Engine service account
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')
          DEFAULT_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          
          # Common env vars for both services (secrets)
          COMMON_ENV="DATABASE_URL=${{ secrets.DATABASE_URL }},SESSION_SECRET=${{ secrets.SESSION_SECRET }},TELLER_APP_ID=${{ secrets.TELLER_APP_ID }},TELLER_CERT=${{ secrets.TELLER_CERT }},TELLER_KEY=${{ secrets.TELLER_KEY }},TELLER_WEBHOOK_SECRET=${{ secrets.TELLER_WEBHOOK_SECRET }},PLAID_CLIENT_ID=${{ secrets.PLAID_CLIENT_ID }},PLAID_PRODUCTION_SECRET=${{ secrets.PLAID_PRODUCTION_SECRET }},PLAID_SANDBOX_SECRET=${{ secrets.PLAID_SANDBOX_SECRET }},XAI_API_KEY=${{ secrets.XAI_API_KEY }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},LOGO_DEV_PUBLISHABLE_KEY=${{ secrets.LOGO_DEV_PUBLISHABLE_KEY }},LOGO_DEV_SECRET_KEY=${{ secrets.LOGO_DEV_SECRET_KEY }},FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }},SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }},STRIPE_SECRET=${{ secrets.STRIPE_SECRET }},STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }},SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
          # Common vars (non-secrets)
          COMMON_VARS="ENVIRONMENT=${{ vars.ENVIRONMENT }},BASE_URL=${{ vars.BASE_URL }},CDN_DOMAIN=${{ vars.CDN_DOMAIN }},COOKIE_DOMAIN=${{ vars.COOKIE_DOMAIN }},TELLER_ENVIRONMENT=${{ vars.TELLER_ENVIRONMENT }},PLAID_ENVIRONMENT=production,VERTEX_PROJECT=${{ vars.VERTEX_PROJECT }},VERTEX_LOCATION=${{ vars.VERTEX_LOCATION }},LLM_DEFAULT_MODEL=${{ vars.LLM_DEFAULT_MODEL }},LLM_REASONING_MODEL=${{ vars.LLM_REASONING_MODEL }},LLM_TOOL_CALL_MODEL=${{ vars.LLM_TOOL_CALL_MODEL }},AUTO_CATEGORIZE_ON_SYNC=${{ vars.AUTO_CATEGORIZE_ON_SYNC }},MIN_CONFIDENCE_THRESHOLD=${{ vars.MIN_CONFIDENCE_THRESHOLD }},CATEGORIZATION_BATCH_SIZE=${{ vars.CATEGORIZATION_BATCH_SIZE }},CATEGORIZATION_RATE_LIMIT=${{ vars.CATEGORIZATION_RATE_LIMIT }},CATEGORIZATION_MAX_RETRIES=${{ vars.CATEGORIZATION_MAX_RETRIES }},CATEGORIZATION_WORKER_ENABLED=${{ vars.CATEGORIZATION_WORKER_ENABLED }},INSIGHTS_ENABLED=${{ vars.INSIGHTS_ENABLED }},INSIGHTS_RATE_LIMIT=${{ vars.INSIGHTS_RATE_LIMIT }},PROCESSING_WORKERS=${{ vars.PROCESSING_WORKERS }},LLM_CONCURRENCY=${{ vars.LLM_CONCURRENCY }},LOGO_CONCURRENCY=${{ vars.LOGO_CONCURRENCY }},SMTP_HOST=${{ vars.SMTP_HOST }},SMTP_PORT=${{ vars.SMTP_PORT }},SMTP_USERNAME=${{ vars.SMTP_USERNAME }},SMTP_FROM=${{ vars.SMTP_FROM }},STORAGE_TYPE=${{ vars.STORAGE_TYPE }},STORAGE_BUCKET=${{ vars.STORAGE_BUCKET }},STORAGE_REGION=${{ vars.STORAGE_REGION }},STORAGE_ENDPOINT=${{ vars.STORAGE_ENDPOINT }},BILLING_ENABLED=${{ vars.BILLING_ENABLED }},STRIPE_PUBLIC=${{ vars.STRIPE_PUBLIC }},STRIPE_PRICE_MONTHLY=${{ vars.STRIPE_PRICE_MONTHLY }},STRIPE_PRICE_ANNUAL=${{ vars.STRIPE_PRICE_ANNUAL }},SENTRY_ENVIRONMENT=${{ vars.SENTRY_ENVIRONMENT }},SENTRY_TRACES_SAMPLE_RATE=${{ vars.SENTRY_TRACES_SAMPLE_RATE }},SENTRY_DEBUG=${{ vars.SENTRY_DEBUG }}"
          
          # Deploy App service (web UI, API - receives traffic)
          echo "🚀 Deploying App service..."
          gcloud run deploy ${{ env.APP_SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 300 \
            --service-account=$DEFAULT_SA \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:probably-db \
            --set-env-vars "RUNTIME_MODE=app,${COMMON_ENV},${COMMON_VARS}"

      - name: Deploy Worker to Cloud Run
        run: |
          # Get the default Compute Engine service account
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')
          DEFAULT_SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
          
          # Common env vars for both services (secrets)
          COMMON_ENV="DATABASE_URL=${{ secrets.DATABASE_URL }},SESSION_SECRET=${{ secrets.SESSION_SECRET }},TELLER_APP_ID=${{ secrets.TELLER_APP_ID }},TELLER_CERT=${{ secrets.TELLER_CERT }},TELLER_KEY=${{ secrets.TELLER_KEY }},TELLER_WEBHOOK_SECRET=${{ secrets.TELLER_WEBHOOK_SECRET }},PLAID_CLIENT_ID=${{ secrets.PLAID_CLIENT_ID }},PLAID_PRODUCTION_SECRET=${{ secrets.PLAID_PRODUCTION_SECRET }},PLAID_SANDBOX_SECRET=${{ secrets.PLAID_SANDBOX_SECRET }},XAI_API_KEY=${{ secrets.XAI_API_KEY }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},LOGO_DEV_PUBLISHABLE_KEY=${{ secrets.LOGO_DEV_PUBLISHABLE_KEY }},LOGO_DEV_SECRET_KEY=${{ secrets.LOGO_DEV_SECRET_KEY }},FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }},SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }},STRIPE_SECRET=${{ secrets.STRIPE_SECRET }},STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }},SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
          # Common vars (non-secrets)
          COMMON_VARS="ENVIRONMENT=${{ vars.ENVIRONMENT }},BASE_URL=${{ vars.BASE_URL }},CDN_DOMAIN=${{ vars.CDN_DOMAIN }},COOKIE_DOMAIN=${{ vars.COOKIE_DOMAIN }},TELLER_ENVIRONMENT=${{ vars.TELLER_ENVIRONMENT }},PLAID_ENVIRONMENT=production,VERTEX_PROJECT=${{ vars.VERTEX_PROJECT }},VERTEX_LOCATION=${{ vars.VERTEX_LOCATION }},LLM_DEFAULT_MODEL=${{ vars.LLM_DEFAULT_MODEL }},LLM_REASONING_MODEL=${{ vars.LLM_REASONING_MODEL }},LLM_TOOL_CALL_MODEL=${{ vars.LLM_TOOL_CALL_MODEL }},AUTO_CATEGORIZE_ON_SYNC=${{ vars.AUTO_CATEGORIZE_ON_SYNC }},MIN_CONFIDENCE_THRESHOLD=${{ vars.MIN_CONFIDENCE_THRESHOLD }},CATEGORIZATION_BATCH_SIZE=${{ vars.CATEGORIZATION_BATCH_SIZE }},CATEGORIZATION_RATE_LIMIT=${{ vars.CATEGORIZATION_RATE_LIMIT }},CATEGORIZATION_MAX_RETRIES=${{ vars.CATEGORIZATION_MAX_RETRIES }},CATEGORIZATION_WORKER_ENABLED=${{ vars.CATEGORIZATION_WORKER_ENABLED }},INSIGHTS_ENABLED=${{ vars.INSIGHTS_ENABLED }},INSIGHTS_RATE_LIMIT=${{ vars.INSIGHTS_RATE_LIMIT }},PROCESSING_WORKERS=${{ vars.PROCESSING_WORKERS }},LLM_CONCURRENCY=${{ vars.LLM_CONCURRENCY }},LOGO_CONCURRENCY=${{ vars.LOGO_CONCURRENCY }},SMTP_HOST=${{ vars.SMTP_HOST }},SMTP_PORT=${{ vars.SMTP_PORT }},SMTP_USERNAME=${{ vars.SMTP_USERNAME }},SMTP_FROM=${{ vars.SMTP_FROM }},STORAGE_TYPE=${{ vars.STORAGE_TYPE }},STORAGE_BUCKET=${{ vars.STORAGE_BUCKET }},STORAGE_REGION=${{ vars.STORAGE_REGION }},STORAGE_ENDPOINT=${{ vars.STORAGE_ENDPOINT }},BILLING_ENABLED=${{ vars.BILLING_ENABLED }},STRIPE_PUBLIC=${{ vars.STRIPE_PUBLIC }},STRIPE_PRICE_MONTHLY=${{ vars.STRIPE_PRICE_MONTHLY }},STRIPE_PRICE_ANNUAL=${{ vars.STRIPE_PRICE_ANNUAL }},SENTRY_ENVIRONMENT=${{ vars.SENTRY_ENVIRONMENT }},SENTRY_TRACES_SAMPLE_RATE=${{ vars.SENTRY_TRACES_SAMPLE_RATE }},SENTRY_DEBUG=${{ vars.SENTRY_DEBUG }}"
          
          # Deploy Worker service (background processing - no external traffic)
          echo "🔄 Deploying Worker service..."
          gcloud run deploy ${{ env.WORKER_SERVICE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --port 8081 \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 3 \
            --timeout 300 \
            --service-account=$DEFAULT_SA \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:probably-db \
            --set-env-vars "RUNTIME_MODE=worker,${COMMON_ENV},${COMMON_VARS}"
          
          echo "✅ Both services deployed successfully"
