root = "."
tmp_dir = "tmp"

[build]
  # Build command - Go only, no Tailwind (worker doesn't serve frontend)
  cmd = "go build -o ./tmp/worker ./cmd/server"
  # Entrypoint (binary to run)
  entrypoint = ["./tmp/worker"]
  # Watch these directories - focus on backend code only
  include_ext = ["go", "sql"]
  exclude_dir = ["assets", "tmp", "vendor", "node_modules", "frontend", "build", "static", ".git"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  follow_symlink = false
  # Delay before rebuild (ms)
  delay = 1000
  # Stop old binary before building
  stop_on_error = true
  # Log file (empty = stdout)
  log = ""
  # Send interrupt signal before killing
  send_interrupt = true
  # Kill delay (how long to wait after sending interrupt)
  kill_delay = 500

[log]
  # Show log time
  time = false
  # Only show main log (silences watcher, build, runner)
  main_only = true

[color]
  main = "blue"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true
