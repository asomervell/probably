root = "."
tmp_dir = "tmp"

[build]
  # We compile the binary ourselves (`make build-app`). Air does NOT build.
  # `cmd` is a deliberate no-op — air's only job is to watch the compiled
  # binary below and restart the process when it changes.
  cmd = "true"
  # Binary to run (built by `make build-app`).
  entrypoint = ["./bin/probably-app"]
  # Watch ONLY the compiled binary — not source files.
  include_ext = []
  include_file = ["bin/probably-app"]
  exclude_dir = ["assets", "tmp", "vendor", "node_modules", "frontend", "build", ".git"]
  # Skip restart if the binary is byte-identical to the last build.
  exclude_unchanged = true
  follow_symlink = false
  # Short debounce so we restart once after the binary write settles.
  delay = 200
  stop_on_error = false
  # Log file (empty = stdout)
  log = ""
  # Send interrupt signal before killing
  send_interrupt = true
  # Kill delay (how long to wait after sending interrupt)
  kill_delay = 500

[log]
  # Show log time
  time = false
  # Show all logs (watcher, runner) so restarts are visible
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true
