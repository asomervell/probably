# Default air config - runs app with Tailwind (frontend concern)
# Use `make dev` to run both app and worker with separate configs
# Use `air -c .air.app.toml` for app only
# Use `air -c .air.worker.toml` for worker only (no Tailwind)

root = "."
tmp_dir = "tmp"

[build]
  # Build command - run Tailwind first, then build Go
  cmd = "./bin/tailwindcss -i ./static/input.css -o ./static/output.css && go build -o ./tmp/app ./cmd/server"
  # Entrypoint (binary to run)
  entrypoint = ["./tmp/app"]
  # Watch these directories
  include_ext = ["go", "tpl", "tmpl", "html", "sql", "css"]
  exclude_dir = ["assets", "tmp", "vendor", "node_modules", "frontend", "build", ".git"]
  # Exclude generated files
  exclude_file = ["static/output.css"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  follow_symlink = false
  # Delay before rebuild (ms)
  delay = 1000
  # Stop old binary before building
  stop_on_error = true
  # Log file (empty = stdout)
  log = ""
  # Send interrupt signal before killing
  send_interrupt = true
  # Kill delay (how long to wait after sending interrupt)
  kill_delay = 500

[log]
  # Show log time
  time = false
  # Only show main log (silences watcher, build, runner)
  main_only = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true

